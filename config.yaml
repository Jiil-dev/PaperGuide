# Paper Analyzer Configuration
# 이 파일의 값을 바꿀 때는 반드시 HANDOFF.md와 CLAUDE.md를 먼저 확인할 것.

# 목표 독자 수준 (expander 시스템 프롬프트 및 leaf 판정 기준)
target_audience:
  level: "대학 1학년"
  background_knowledge:
    - "고등학교 수학2 (미적분 기초)"
    - "고등학교 물리1"
    - "기초 프로그래밍"
  exclude_knowledge:
    - "선형대수"
    - "확률론"
    - "머신러닝"
    - "딥러닝"

# 트리 확장 제어 (비용 방어의 핵심)
expansion:
  max_depth: 4              # 실험적으로 4부터 시작. 품질 부족 시 5~6으로 상향 검토.
  max_children_per_node: 5  # 한 노드가 요구할 수 있는 최대 하위 개념 수

# 중복 차단
dedup:
  similarity_threshold: 0.88
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"

# 자기검증
verification:
  max_retries: 0            # 검증 실패 시 재시도 안 함 (호출 수 절감)
  sample_rate: 0.1          # 검증 비율 (0.1 = 10% 노드만 검증)
  min_confidence: 0.7       # 이 이상이어야 통과. 너무 높이면 재생성 증가.
  check_types:
    - "hallucination"
    - "omission"
    - "contradiction"
    - "math_error"

# Claude CLI 호출 설정
claude:
  cli_path: "claude"
  mode: "cache"             # live | cache | dry_run
                            # cache: 프롬프트 SHA-256 해시로 디스크 캐시. 디버깅 중 기본값.
                            # live: 실제 claude -p 호출. 최종 실행용.
                            # dry_run: 실제 호출 없이 스키마 기본값 반환. 파이프라인 검증용.
  default_mode: "cache"     # CLI 에서 --mode 안 주면 이 값 사용
  default_cache_dir: "data/cache"  # CLI 에서 --cache-dir 안 주면 이 값 사용
  max_total_calls: 1500     # Phase 3: 10~15x quota for 3-Part generation
  timeout_seconds: 600      # 단일 호출 타임아웃
  sleep_between_calls: 3    # 호출 간 대기(초). 속도 제한 완화.
  max_workers: 3            # 병렬 처리 동시 호출 수 (1=순차)

# 캐시 해시 정책 (claude_client.py가 참조)
# 해시 입력: system_prompt + user_prompt + json.dumps(schema, sort_keys=True) + CLAUDE_CLIENT_VERSION
# 해시 알고리즘: SHA-256
# 캐시 파일 경로: data/cache/claude_responses/<sha256>.json
# CLAUDE_CLIENT_VERSION은 claude_client.py 상단의 상수. 프롬프트 템플릿/스키마 수정 시 +1로 일괄 무효화.

# 파일 경로
paths:
  pdf_input: "data/papers"
  cache_dir: "data/cache"
  output_dir: "data/output"
  checkpoints_dir: "checkpoints"

# === Phase 3 신규 섹션 ===

part1:
  max_key_contributions: 4
  max_main_results: 5

part2:
  max_depth: 2                # 이전 4 → 2 (헤더 Level 3~5 로 제한)
  max_children_per_node: 3    # 한 노드의 최대 하위 논점 수 (호출 수 절감)
  use_placeholders: true      # 기초 지식 플레이스홀더 사용

part3:
  min_topics: 5               # 최소 주제 수
  use_curator: true           # Claude 큐레이터로 주제 선별 (가변 N)
  max_topics: 15              # 최대 주제 수
  subsections_per_topic: 6    # 주제당 평균 하위 항목 수
  allow_claude_to_add: true   # Claude가 사전 풀에 없는 주제 추가 허용
  predefined_pool:
    - id: "neural_network_basics"
      title: "신경망의 기초"
    - id: "vector_dot_product"
      title: "벡터와 내적"
    - id: "matrix_multiplication"
      title: "행렬 곱셈"
    - id: "softmax"
      title: "softmax 함수"
    - id: "rnn_lstm_gru"
      title: "RNN, LSTM, GRU"
    - id: "cnn_basics"
      title: "CNN의 기초"
    - id: "encoder_decoder"
      title: "Encoder-Decoder 패러다임"
    - id: "attention_history"
      title: "Attention 메커니즘의 역사"
    - id: "optimization_basics"
      title: "최적화 기법"
    - id: "regularization"
      title: "Regularization 기법"
